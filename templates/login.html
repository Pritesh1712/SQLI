<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - SQLi Detector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #00ffcc;
        }

        .login-container {
            background-color: #1c1c1c;
            padding: 2.5rem 1.875rem; /* 40px 30px */
            border-radius: 0.75rem; /* 12px */
            box-shadow: 0 0 1.25rem rgba(0, 255, 204, 0.2); /* 20px */
            width: 100%;
            max-width: 25rem; /* 400px */
            text-align: center;
        }

        h1 {
            margin-bottom: 1.5rem; /* 24px */
            color: #00ffcc;
            font-size: 1.625rem; /* 26px */
            text-transform: uppercase;
            letter-spacing: 0.09375rem; /* 1.5px */
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem; /* 12px */
            margin: 0.625rem 0 1.25rem; /* 10px 0 20px */
            border: none;
            border-radius: 0.375rem; /* 6px */
            background-color: #2b2b2b;
            color: #00ffcc;
            font-size: 1rem; /* 16px */
            border: 0.0625rem solid #00ffcc; /* 1px */
            box-sizing: border-box;
        }

        input::placeholder {
            color: #00ffcc88;
        }

        button {
            width: 100%;
            background-color: #00ffcc;
            color: #1c1c1c;
            padding: 0.75rem; /* 12px */
            border: none;
            border-radius: 0.375rem; /* 6px */
            font-size: 1rem; /* 16px */
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #00e6b8;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Admin Login</h1>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
